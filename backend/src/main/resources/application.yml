spring:
  datasource:
    url: jdbc:sqlite:meetingroom.db
    driver-class-name: org.sqlite.JDBC
    username: sa
    password: sa
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: enterpriseConferenceRoomBookingSystemSuperSecretKey2026!
    expirationMs: 86400000 # 24 hours
  booking:
    checkinTimeoutMinutes: 15

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
